# =============================================================================
# Golden Team NEO Platform — Nginx Virtual Hosts
# Replace all yourdomain.com with your actual domain
# SSL certificates managed by Certbot (Let's Encrypt)
# =============================================================================

# --- NEO Employee Portal ---
server {
    listen 443 ssl http2;
    server_name portal.yourdomain.com;
    ssl_certificate     /etc/nginx/ssl/live/portal.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/portal.yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512;
    ssl_prefer_server_ciphers off;

    client_max_body_size 100M;

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://neo_portal;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        proxy_pass http://neo_portal;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- Odoo ERP ---
server {
    listen 443 ssl http2;
    server_name erp.yourdomain.com;
    ssl_certificate     /etc/nginx/ssl/live/erp.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/erp.yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 200M;

    location /longpolling {
        proxy_pass http://odoo/longpolling;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://odoo;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 720s;
        proxy_connect_timeout 720s;
        proxy_send_timeout 720s;
    }
}

