[options]
; Golden Team NEO Platform — Odoo 19.0 Configuration
; Document: GT-INFRA-001 | Version: 1.1 | March 2026 (Updated: Odoo 17 → 19.0)

; Database
db_host = postgres
db_port = 5432
db_user = odoo
db_password = ODOO_DB_PASSWORD_PLACEHOLDER
db_name = odoo_production
db_maxconn = 64

; Admin
admin_passwd = ODOO_ADMIN_PASSWORD_PLACEHOLDER

; Paths
data_dir = /var/lib/odoo
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons

; Performance
workers = 4
max_cron_threads = 2
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200

; Logging
log_level = warn
logfile = /var/log/odoo/odoo.log
log_rotate = True

; Email
email_from = notifications@yourdomain.com
smtp_server = smtp.yourmailprovider.com
smtp_port = 587
smtp_ssl = False
smtp_user = notifications@yourdomain.com
smtp_password = SMTP_PASSWORD_PLACEHOLDER

; Security
list_db = False
proxy_mode = True
