# =============================================================================
# Golden Team NEO Platform — Redis 7.2 Configuration
# Document: GT-INFRA-001 | Version: 1.0 | March 2026
#
# Database assignments:
#   DB 0 — API Response Cache       (512MB, allkeys-lru)
#   DB 1 — BullMQ Job Queues        (1024MB, noeviction)
#   DB 2 — Session Management       (128MB, volatile-ttl)
#   DB 3 — Real-Time Pub/Sub        (64MB, allkeys-lru)
#   DB 4 — Rate Limiting            (32MB, allkeys-lru)
# =============================================================================

# Network
bind 0.0.0.0
port 6379
protected-mode yes
requirepass REDIS_PASSWORD_PLACEHOLDER

# General
daemonize no
loglevel notice
databases 8
maxmemory 2gb

# Memory management
# NOTE: We use allkeys-lru as the global policy.
# The BullMQ queue database (DB 1) uses noeviction enforced at application level
# by monitoring memory and alerting before the 2GB limit is reached.
maxmemory-policy allkeys-lru
maxmemory-samples 5

# Persistence — AOF for durability (critical for job queues)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB snapshots (secondary backup)
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /data

# Performance
hz 10
dynamic-hz yes
aof-rewrite-incremental-fsync yes
rdb-save-incremental-fsync yes

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Keyspace notifications (for BullMQ job events)
notify-keyspace-events "Ex"

# Connections
maxclients 1000
tcp-keepalive 300
timeout 0

# Latency monitoring
latency-monitor-threshold 100
latency-tracking yes
